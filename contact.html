          <div class="window-body">
            <form action="https://formspree.io/f/mjgjwvwq" method="POST">
              <div class="mb-8">
                <label for="name" style="font-size: 12px; display: block; margin-bottom: 4px;">
                  <strong>Name:</strong>
                </label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  class="form-95"
                  placeholder="Enter your name..."
                  required
                />
              </div>
              <div class="mb-8">
                <label for="email" style="font-size: 12px; display: block; margin-bottom: 4px;">
                  <strong>Email:</strong>
                </label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-95"
                  placeholder="your@email.com"
                  required
                />
              </div>
              <div class="mb-8">
                <label for="subject" style="font-size: 12px; display: block; margin-bottom: 4px;">
                  <strong>Subject:</strong>
                </label>
                <input
                  type="text"
                  id="subject"
                  name="subject"
                  class="form-95"
                  placeholder="Message subject..."
                />
              </div>
              <div class="mb-16">
                <label for="message" style="font-size: 12px; display: block; margin-bottom: 4px;">
                  <strong>Message:</strong>
                </label>
                <textarea
                  id="message"
                  name="message"
                  class="form-95"
                  rows="6"
                  placeholder="Type your message here..."
                  required
                  style="resize: vertical;"
                ></textarea>
              </div>
              <div class="flex gap-8">
                <button type="submit" class="btn btn-primary">
                  <img
                    src="https://win98icons.alexmeub.com/icons/png/envelope_closed-1.png"
                    class="icon-16"
                    alt=""
                  />

                    src="https://win98icons.alexmeub.com/icons/png/undo-0.png"
                    class="icon-16"
                    alt=""
                  />

              </div>
            </form>

    <script>
      function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = now.getMinutes().toString().padStart(2, "0");
        const ampm = hours >= 12 ? "PM" : "AM";
        hours = hours % 12;
        hours = hours ? hours : 12;
        document.getElementById("clock").textContent =
          hours + ":" + minutes + " " + ampm;
      }
      updateClock();
      setInterval(updateClock, 1000);
    </script>
